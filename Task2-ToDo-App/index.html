<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart To-Do List</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#567c8d,#c8d9e6);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
width:400px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h1{
margin-bottom:20px;
color:#333;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:10px 15px;
border:none;
background:#2f4156;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00c6ff;
}

ul{
list-style:none;
padding:0;
margin-top:20px;
}

li{
background:#f4f4f4;
padding:10px;
margin-bottom:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

li.completed{
text-decoration:line-through;
color:gray;
background:#d9ffd9;
}

.delete{
background:red;
padding:5px 10px;
border-radius:4px;
color:white;
cursor:pointer;
}

.delete:hover{
background:darkred;
}

</style>
</head>

<body>

<div class="container">

<h1>📝 My To-Do List</h1>

<div class="input-area">
<input type="text" id="taskInput" placeholder="Enter a task...">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function renderTasks(){

const taskList=document.getElementById("taskList");
taskList.innerHTML="";

tasks.forEach((task,index)=>{

let li=document.createElement("li");

if(task.completed){
li.classList.add("completed");
}

li.innerHTML = `
<span onclick="toggleTask(${index})">${task.text}</span>
<span class="delete" onclick="deleteTask(${index})">X</span>
`;

taskList.appendChild(li);

});

}

function addTask(){

const input=document.getElementById("taskInput");
const text=input.value.trim();

if(text===""){
alert("Please enter a task");
return;
}

tasks.push({text:text,completed:false});

input.value="";

saveTasks();
renderTasks();

}

function toggleTask(index){

tasks[index].completed=!tasks[index].completed;

saveTasks();
renderTasks();

}

function deleteTask(index){

tasks.splice(index,1);

saveTasks();
renderTasks();

}

renderTasks();

</script>

</body>
</html>
